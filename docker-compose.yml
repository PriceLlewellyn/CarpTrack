version: "3.8"

services:
  # --- DATABASE LAYER ---
  db:
    image: postgres:15-alpine
    container_name: carptrack_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - carptrack_network

  # --- PGADMIN ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: carptrack_pgadmin
    restart: always
    environment:
      # These are the credentials to log into the pgAdmin website
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80" # Access pgAdmin at http://localhost:5050
    networks:
      - carptrack_network
    depends_on:
      - db

networks:
  carptrack_network:
    driver: bridge

volumes:
  pgdata:
